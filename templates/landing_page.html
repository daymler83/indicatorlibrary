<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ministry Dashboard - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-dark: #0a2e1a; /* Deep forest green */
      --primary: #4CAF50;
      --primary-light: #2e7d4e;
      --accent: #a3c585; /* Soft green accent */
      --accent-dark: #5a8f3c;
      --light: #f8faf7;
      --error: #e53935;
      --text: #333333;
      --text-light: #5a6d5a;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--light);
      color: var(--text);
      line-height: 1.6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(163, 197, 133, 0.1) 0%, rgba(163, 197, 133, 0) 50%),
        radial-gradient(circle at 90% 80%, rgba(26, 86, 50, 0.1) 0%, rgba(26, 86, 50, 0) 50%);
    }
    
    .login-container {
      display: flex;
      width: 1000px;
      max-width: 95%;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(10, 46, 26, 0.15);
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    
    .login-container:hover {
      transform: translateY(-5px);
    }
    
    .login-image {
      flex: 1.2;
      background: 
        linear-gradient(135deg, rgba(76, 175, 80, 0.9) 0%, rgba(46, 125, 78, 0.8) 100%),
        url('https://images.unsplash.com/photo-1605106702734-205df224ecce?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') center/cover no-repeat;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px;
    }
    
    .app-info {
      margin-top: 20px;
    }
    

  .app-info h1 {
    font-size: 28px;
    font-weight: 700;
    color: white;
    margin-bottom: 15px;
    line-height: 1.3;
    text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
    letter-spacing: 0.5px;
  }

  .features-list li {
    position: relative;
    padding-left: 25px;
    margin-bottom: 15px;
    color: white;
    font-size: 15px;
    font-weight: 500;
    text-shadow: 0 0 2px rgba(0, 0, 0, 0.15);
  }

    
    .app-info p {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 5px;
    }
    
    
    .login-form-container {
      flex: 1;
      padding: 60px 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }
    
    .logo-container {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .logo {
      height: 70px;
      width: auto;
      margin-bottom: 15px;
      transition: transform 0.3s ease;
    }
    
    .logo:hover {
      transform: scale(1.05);
    }
    
    .login-form h2 {
      color: var(--primary);
      text-align: center;
      margin-bottom: 30px;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    
    .form-group {
      margin-bottom: 25px;
      position: relative;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 10px;
      color: var(--primary);
      font-weight: 500;
      font-size: 14px;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid #e0e6e0;
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.3s ease;
      background-color: #f8faf7;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(46, 125, 78, 0.2);
      background-color: white;
    }
    
    .form-group input::placeholder {
      color: #a8b5a8;
    }
    
    .login-button {
      width: 100%;
      padding: 15px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    
    .login-button:hover {
      background-color: var(--primary-light);
      box-shadow: 0 5px 15px rgba(26, 86, 50, 0.3);
    }
    
    .login-button:active {
      transform: translateY(1px);
    }
    
    .error-message {
      color: var(--error);
      text-align: center;
      margin-top: 20px;
      min-height: 20px;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 13px;
      color: var(--text-light);
    }
    
    .version-info {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 12px;
      color: var(--text-light);
    }


    .app-title {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 2.5rem;
        font-weight: 600;
        color: #1a3e2d;
        text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        letter-spacing: 0.5px;
        margin-bottom: 10px;
    }

    .ministry-name {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 1.1rem;
        color: #2d5a45;
        font-weight: 500;
        margin: 5px 0;
    }

    .country-name {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 1rem;
        color: #2d5a45;
        font-style: italic;
        margin: 5px 0 20px 0;
    }

    .features-list {
        list-style-type: none;
        padding-left: 0;
    }

    .feature-item {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 1rem;
        color: #1e4530;
        padding: 8px 0;
        border-left: 3px solid #3a7d5c;
        padding-left: 15px;
        margin: 10px 0;
        transition: all 0.3s ease;
    }

    .feature-item:hover {
        transform: translateX(5px);
        background-color: rgba(255, 255, 255, 0.1);
    }
    
    @media (max-width: 900px) {
      .login-container {
        flex-direction: column;
      }
      
      .login-image {
        padding: 30px;
        text-align: center;
      }
      
      .login-form-container {
        padding: 40px 30px;
      }
      
      .features-list {
        display: none;
      }
    }
    
    /* Animation for form elements */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .login-form > * {
      animation: fadeIn 0.5s ease forwards;
    }
    
    .login-form > *:nth-child(1) { animation-delay: 0.1s; }
    .login-form > *:nth-child(2) { animation-delay: 0.2s; }
    .login-form > *:nth-child(3) { animation-delay: 0.3s; }
    .login-form > *:nth-child(4) { animation-delay: 0.4s; }
    .login-form > *:nth-child(5) { animation-delay: 0.5s; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-image">
      <div class="app-info">
        <h1 class="app-title">INDICATOR LIBRARY SYSTEM</h1>
      </div>
      
      <ul class="features-list">
        <li class="feature-item">✓ Track industrial indicators and metrics</li>
        <li class="feature-item">✓ Visualize sector performance data</li>
        <li class="feature-item">✓ Generate comprehensive reports</li>
        <li class="feature-item">✓ Monitor mineral resource statistics</li>
      </ul>
    </div>
    <div class="login-form-container">
      <div class="logo-container">
        <img src="/static/mim.png" alt="Ministry Logo" class="logo">
      </div>
      
      <form id="loginForm" class="login-form">
        <h2>Welcome!</h2>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="text" id="email" required placeholder="your.email@industry.gov.sa">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        
        <button type="submit" class="login-button">Access Library</button>
        
        <p id="errorMessage" class="error-message"></p>
      </form>
      
      <div class="footer">
        <p>Secure access to Ministry data systems</p>
        <p>© 2025 Ministry of Industry and Mineral Resources</p>
      </div>
      
      <div class="version-info">v1.6.1</div>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorEl = document.getElementById("errorMessage");

      errorEl.textContent = "";
      errorEl.style.opacity = 0;

      try {
        const response = await fetch("http://localhost:8000/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded"
          },
          body: new URLSearchParams({
            username: email,
            password: password
          })
        });

        const data = await response.json();

        if (response.ok && data.access_token) {
          localStorage.setItem("access_token", data.access_token);
          window.location.href = "/dashboard";
        } else {
          errorEl.textContent = data.detail || "Authentication failed. Please check your credentials.";
          errorEl.style.opacity = 1;
        }
      } catch (err) {
        errorEl.textContent = "Connection error. Please try again later.";
        errorEl.style.opacity = 1;
      }
    });

    // Add subtle interactive effects
    document.querySelectorAll('.form-group input').forEach(input => {
      input.addEventListener('focus', function() {
        this.parentNode.querySelector('label').style.color = 'var(--primary-light)';
      });
      input.addEventListener('blur', function() {
        this.parentNode.querySelector('label').style.color = 'var(--primary)';
      });
    });
  </script>
</body>
</html>
