<!DOCTYPE html>
<html>
<head>
    <title>{{ indicator.name }} Trend</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-4 text-center">{{ indicator.name }} - Trend Over Time</h2>

    <canvas id="trendChart" width="600" height="300"></canvas>

    <div class="text-center mt-4">
        <a href="/indicator-library/dashboard" class="btn btn-secondary">⬅ Back to Dashboard</a>
    </div>
</div>

<script>
    const ctx = document.getElementById('trendChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: {{ years | tojson }},
            datasets: [{
                label: '{{ indicator.name }}',
                data: {{ data | tojson }},
                borderColor: 'blue',
                fill: false,
                tension: 0.3,
                pointRadius: 5,
                pointHoverRadius: 7
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: true },
                tooltip: { mode: 'index', intersect: false }
            },
            scales: {
                y: { beginAtZero: true },
                x: { title: { display: true, text: 'Year' } }
            }
        }
    });
</script>
</body>
</html>
