<!DOCTYPE html>
<html>
<head>
    <title>Upload CSV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-4 text-center">📤 Upload CSV File</h2>

    <form action="/upload/" method="post" enctype="multipart/form-data" class="border p-4 bg-white rounded shadow-sm">
        <div class="mb-3">
            <label for="file_type" class="form-label">What are you uploading?</label>
            <select name="file_type" id="file_type" class="form-select">
                <option value="indicators">Indicators</option>
                <option value="values">Indicator Values</option>
            </select>
        </div>

        <div class="mb-3">
            <input class="form-control" type="file" name="file" accept=".csv" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Upload CSV</button>
    </form>
</div>
</body>
</html>
