<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicator Library System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f7e9; /* Light green background */
            color: #1a3e2d; /* Dark green text */
            padding: 40px;
            line-height: 1.6;
        }

        .login-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: flex;
        }

        .login-content {
            padding: 40px;
            flex: 1;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: #0a2e38; /* Navy blue for title */
            letter-spacing: -0.5px;
        }

        .features-list {
            list-style: none;
            padding: 0;
            margin: 30px 0;
        }

        .features-list li {
            position: relative;
            padding-left: 30px;
            margin-bottom: 16px;
            font-size: 1rem;
        }

        .features-list li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #3a7d5c; /* Teal checkmark */
            font-weight: bold;
        }

        .features-list strong {
            color: #0a2e38; /* Dark blue for keywords */
        }

        .divider {
            height: 1px;
            background: #e0e6ed;
            margin: 30px 0;
        }

        .welcome-title {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 20px;
            color: #0a2e38;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            color: #5a6d7e; /* Gray for labels */
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e6ed;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #3a7d5c;
            box-shadow: 0 0 0 3px rgba(58, 125, 92, 0.1);
            outline: none;
        }

        .password-input {
            letter-spacing: 3px;
            font-size: 1.2rem;
        }

        .footer {
            font-size: 0.8rem;
            color: #7b8b9a;
            text-align: center;
            margin-top: 40px;
        }

        .version {
            font-family: monospace;
            color: #9aabb9;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-content">
            <h1>Indicator Library System</h1>
            
            <ul class="features-list">
                <li><strong>Track</strong> industrial indicators and energy</li>
                <li><strong>Visualize</strong> social performance data</li>
                <li><strong>Generate</strong> comprehensive reports</li>
                <li><strong>Notify</strong> mineral resource database</li>
            </ul>

            <div class="divider"></div>

            <h2 class="welcome-title">Welcome!</h2>
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" value="you.email@industry.gov.sa">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" value="••••••" class="password-input">
            </div>

            <div class="divider"></div>

            <div class="footer">
                <p>Secure access to Ministry data systems</p>
                <p>© 2023 Ministry of Industry and Mineral Resources</p>
                <p class="version">v1.6.1</p>
            </div>
        </div>
    </div>
</body>
</html>
