<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>وزارة الصناعة والثروة المعدنية | Ministry of Industry and Mineral Resources</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --green-dark: #1a5632;
      --green-light: #4CAF50;
      --gold: #D4AF37;
      --white: #ffffff;
      --black: #333;
    }
    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4efe9 100%);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .language-switcher {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 100;
    }
    .lang-btn {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--green-dark);
      color: var(--green-dark);
      padding: 5px 15px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    .lang-btn:hover {
      background: var(--green-dark);
      color: white;
    }
    .login-container {
      background: var(--white);
      border-radius: 15px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      width: 400px;
      text-align: center;
      position: relative;
      margin: 50px auto;
      animation: fadeInUp 0.8s ease-out;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo {
      padding: 30px 0;
      background: linear-gradient(to right, var(--green-dark), var(--green-light));
      position: relative;
      overflow: hidden;
    }
    .logo::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="%23ffffff10"><path d="M30,10 Q50,5 70,10 T90,30 Q95,50 90,70 T70,90 Q50,95 30,90 T10,70 Q5,50 10,30 T30,10"/></svg>');
      opacity: 0.3;
    }
    .logo img {
      height: 80px;
      position: relative;
      z-index: 2;
      transition: transform 0.5s;
    }
    .logo:hover img {
      transform: scale(1.05);
    }
    .login-form {
      padding: 30px;
    }
    h2 {
      color: var(--green-dark);
      margin-bottom: 25px;
      font-weight: 700;
    }
    .input-group {
      margin-bottom: 25px;
      text-align: right;
    }
    label {
      display: block;
      margin-bottom: 10px;
      color: var(--green-dark);
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 15px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s;
      text-align: right;
      margin-top: 5px;
    }
    input:focus {
      border-color: var(--gold);
      outline: none;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
    }
    .password-container {
      position: relative;
    }
    .password-toggle {
      position: absolute;
      left: 15px;
      top: 58px;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--green-dark);
    }
    .options {
      display: flex;
      justify-content: space-between;
      margin-bottom: 25px;
      align-items: center;
    }
    .checkbox {
      display: flex;
      align-items: center;
    }
    .checkbox input {
      width: auto;
      margin-left: 8px;
    }
    .forgot-password {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }
    .forgot-password:hover {
      color: var(--green-dark);
      text-decoration: underline;
    }
    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(to right, var(--green-dark), var(--green-light));
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .login-btn::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
      transform: rotate(45deg);
      transition: all 0.5s;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(26, 86, 50, 0.3);
    }
    .login-btn:hover::after {
      left: 100%;
    }
    .footer {
      margin-top: 20px;
      color: #777;
      font-size: 14px;
      border-top: 1px solid #eee;
      padding-top: 15px;
    }
    .floating-icons {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    .floating-icons i {
      position: absolute;
      color: rgba(26, 86, 50, 0.05);
      animation: float 15s infinite linear;
    }
    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(-100vh) rotate(360deg); }
    }
    html[dir="rtl"] .input-group {
      text-align: right;
    }
    html[dir="rtl"] .password-toggle {
      left: auto;
      right: 15px;
    }
    html[dir="rtl"] .checkbox input {
      margin-left: 0;
      margin-right: 8px;
    }
    .error-message {
      color: #d32f2f;
      background-color: #fce4e4;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 15px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="language-switcher">
    <button class="lang-btn" onclick="toggleLanguage()">العربية</button>
  </div>

  <div class="floating-icons">
    <i class="fas fa-industry" style="top: 10%; left: 5%; font-size: 24px; animation-delay: 0s;"></i>
    <i class="fas fa-mountain" style="top: 20%; left: 80%; font-size: 30px; animation-delay: 2s;"></i>
    <i class="fas fa-oil-can" style="top: 50%; left: 15%; font-size: 28px; animation-delay: 4s;"></i>
    <i class="fas fa-chart-line" style="top: 70%; left: 75%; font-size: 22px; animation-delay: 6s;"></i>
  </div>

  <div class="login-container">
    <div class="logo">
      <img src="/static/mim.png" alt="Ministry Logo">
    </div>
    <div class="login-form">
      <div id="errorMessage" class="error-message"></div>
      <h2 class="lang-en">Login to Your Account</h2>
      <h2 class="lang-ar" style="display: none;">تسجيل الدخول إلى حسابك</h2>
      <form id="loginForm" onsubmit="return false;">
        <div class="input-group">
          <label class="lang-en">Username or Email</label>
          <label class="lang-ar" style="display: none;">اسم المستخدم أو البريد الإلكتروني</label>
          <input type="text" id="username" placeholder="Enter your username" class="lang-en" required>
          <input type="text" id="username-ar" placeholder="أدخل اسم المستخدم" class="lang-ar" style="display: none;" required>
        </div>
        <div class="input-group">
          <label class="lang-en">Password</label>
          <label class="lang-ar" style="display: none;">كلمة المرور</label>
          <div class="password-container">
            <input type="password" id="password" placeholder="Enter your password" class="lang-en" required>
            <input type="password" id="password-ar" placeholder="أدخل كلمة المرور" class="lang-ar" style="display: none;" required>
            <i class="fas fa-eye password-toggle" onclick="togglePassword()"></i>
          </div>
        </div>
        <div class="options">
          <div class="checkbox">
            <input type="checkbox" id="remember">
            <label for="remember" class="lang-en">Remember Me</label>
            <label for="remember" class="lang-ar" style="display: none;">تذكرني</label>
          </div>
          <a href="#" class="forgot-password lang-en">Forgot Password?</a>
          <a href="#" class="forgot-password lang-ar" style="display: none;">نسيت كلمة المرور؟</a>
        </div>
        <button type="submit" class="login-btn lang-en">Login</button>
        <button type="submit" class="login-btn lang-ar" style="display: none;">تسجيل الدخول</button>
      </form>
      <div class="footer">
        <p class="lang-en">&copy; 2025 Ministry of Industry and Mineral Resources. All rights reserved.</p>
        <p class="lang-ar" style="display: none;">&copy; 2023 وزارة الصناعة والثروة المعدنية. جميع الحقوق محفوظة.</p>
      </div>
    </div>
  </div>

  <script>
    // Toggle password visibility
    function togglePassword() {
      const passwordInputs = document.querySelectorAll('input[type="password"]');
      const toggleIcon = document.querySelector('.password-toggle');
      passwordInputs.forEach(input => {
        if (input.style.display !== 'none') {
          if (input.type === 'password') {
            input.type = 'text';
            toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
          } else {
            input.type = 'password';
            toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
          }
        }
      });
    }

    // Toggle Arabic/English
    function toggleLanguage() {
      const langBtn = document.querySelector('.lang-btn');
      const arElements = document.querySelectorAll('.lang-ar');
      const enElements = document.querySelectorAll('.lang-en');
      
      if (langBtn.textContent === 'العربية') {
        langBtn.textContent = 'English';
        document.documentElement.dir = 'rtl';
        arElements.forEach(el => el.style.display = 'block');
        enElements.forEach(el => el.style.display = 'none');
      } else {
        langBtn.textContent = 'العربية';
        document.documentElement.dir = 'ltr';
        arElements.forEach(el => el.style.display = 'none');
        enElements.forEach(el => el.style.display = 'block');
      }
    }

    // Handle form submission
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      // 1. Prevent default form submission
      e.preventDefault();
      console.log("Form submission intercepted");

      // 2. Get form data (works for both English/Arabic fields)
      const username = document.getElementById('username').value || 
                      document.getElementById('username-ar').value;
      const password = document.getElementById('password').value || 
                      document.getElementById('password-ar').value;

      // 3. Show loading state
      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
      submitBtn.disabled = true;

      try {
          console.log("Attempting login...");
          
          // 4. Make the POST request
          const response = await fetch("/auth/login", {
              method: "POST",
              headers: {
                  "Content-Type": "application/json",
              },
              body: JSON.stringify({
                  username: username,
                  password: password
              }),
              credentials: 'include'  // Important for session cookies
          });

          console.log("Received response:", response);

          if (!response.ok) {
              const errorData = await response.json();
              throw new Error(errorData.detail || 'Login failed');
          }

          // 5. Handle successful login
          const data = await response.json();
          console.log("Login successful:", data);
          
          // Store token (if using JWT)
          if (data.access_token) {
              localStorage.setItem("access_token", data.access_token);
          }
          
          // Redirect to dashboard
          window.location.href = "/dashboard";

      } catch (error) {
          console.error("Login error:", error);
          const errorElement = document.getElementById('errorMessage');
          errorElement.textContent = error.message;
          errorElement.style.display = 'block';
      } finally {
          // 6. Reset button state
          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
      }
    });

    // Add floating icons dynamically
    function addFloatingIcons() {
      const container = document.querySelector('.floating-icons');
      const icons = ['fa-industry', 'fa-mountain', 'fa-oil-can', 'fa-chart-line', 'fa-cogs', 'fa-gem'];
      for (let i = 0; i < 10; i++) {
        const icon = document.createElement('i');
        icon.className = `fas ${icons[Math.floor(Math.random() * icons.length)]}`;
        icon.style.left = `${Math.random() * 100}%`;
        icon.style.top = `${Math.random() * 100}%`;
        icon.style.fontSize = `${Math.random() * 20 + 15}px`;
        icon.style.animationDelay = `${Math.random() * 10}s`;
        container.appendChild(icon);
      }
    }
    addFloatingIcons();

    // Add input focus animation
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('focus', () => {
        input.style.padding = '16px 21px';
        input.style.boxShadow = '0 0 0 4px rgba(212, 175, 55, 0.1)';
      });
      input.addEventListener('blur', () => {
        input.style.padding = '15px 20px';
        input.style.boxShadow = 'none';
      });
    });
  </script>
</body>
</html>
