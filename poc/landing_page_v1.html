<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ministry of Industry and Mineral Resources - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #1a3e72; /* Dark blue - common in government sites */
      --secondary-color: #2457a6;
      --accent-color: #e6af21; /* Gold accent */
      --light-color: #f5f7fa;
      --error-color: #d32f2f;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--light-color);
      color: #333;
      line-height: 1.6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-image: linear-gradient(135deg, #f5f7fa 0%, #e4e8ed 100%);
    }
    
    .login-container {
      display: flex;
      width: 900px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
    
    .login-image {
      flex: 1;
      background: url('https://www.example.com/saudi-industry-image.jpg') center/cover no-repeat;
      position: relative;
    }
    
    .login-image::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(to bottom, rgba(26, 62, 114, 0.7), rgba(26, 62, 114, 0.9));
    }
    
    .login-image-content {
      position: relative;
      z-index: 1;
      color: white;
      padding: 40px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .login-image-content h1 {
      font-size: 28px;
      margin-bottom: 20px;
      font-weight: 500;
    }
    
    .login-image-content p {
      font-size: 16px;
      opacity: 0.9;
    }
    
    .login-form-container {
      flex: 1;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo img {
      height: 60px;
    }
    
    .login-form h2 {
      color: var(--primary-color);
      text-align: center;
      margin-bottom: 30px;
      font-size: 24px;
      font-weight: 500;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--primary-color);
      font-weight: 500;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--secondary-color);
      box-shadow: 0 0 0 2px rgba(36, 87, 166, 0.2);
    }
    
    .login-button {
      width: 100%;
      padding: 12px;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    
    .login-button:hover {
      background-color: var(--secondary-color);
    }
    
    .error-message {
      color: var(--error-color);
      text-align: center;
      margin-top: 15px;
      min-height: 20px;
    }
    
    .footer {
      text-align: center;
      margin-top: 30px;
      font-size: 14px;
      color: #666;
    }
    
    @media (max-width: 768px) {
      .login-container {
        flex-direction: column;
        width: 90%;
      }
      
      .login-image {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-image">
      <div class="login-image-content">
        <h1>Indicator Library System</h1>
        <p>Ministry of Industry and Mineral Resources<br>Kingdom of Saudi Arabia</p>
      </div>
    </div>
    
    <div class="login-form-container">
      <div class="logo">
        <!-- Replace with actual ministry logo -->
        <img src="https://www.example.com/ministry-logo.png" alt="Ministry Logo">
      </div>
      
      <form id="loginForm" class="login-form">
        <h2>Login to Your Account</h2>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="text" id="email" required placeholder="Enter your official email">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Enter your password">
        </div>
        
        <button type="submit" class="login-button">Login</button>
        
        <p id="errorMessage" class="error-message"></p>
      </form>
      
      <div class="footer">
        <p>© 2023 Ministry of Industry and Mineral Resources. All rights reserved.</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorEl = document.getElementById("errorMessage");

      errorEl.textContent = "";

      try {
        const response = await fetch("http://localhost:8000/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded"
          },
          body: new URLSearchParams({
            username: email,
            password: password
          })
        });

        const data = await response.json();

        if (response.ok && data.access_token) {
          localStorage.setItem("access_token", data.access_token);
          window.location.href = "/dashboard";
        } else {
          errorEl.textContent = data.detail || "Login failed. Please check your credentials.";
        }
      } catch (err) {
        errorEl.textContent = "Network error or server not running.";
      }
    });
  </script>
</body>
</html>
